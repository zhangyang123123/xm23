services:
  postgres:
    image: postgres:16-alpine
    container_name: api-audit-db
    environment:
      POSTGRES_DB: api_audit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-audit-service
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/api_audit
      ADMIN_TOKEN: admin-token-change-me
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
